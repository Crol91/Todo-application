<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script type="module" src="/src/main.js" defer></script>
    <title>The Todos</title>
  </head>
  <body>
    <div
      class="d-flex flex-row justify-content-center align-items-center bg-success gap-5"
      style="height: 100vh; width: 100%; text-align: center"
    >
      <div>
        <form id="actForm" class="d-flex flex-column gap-4">
          <label for="activity" style="font-weight: bold" ;
            >Fler saker att göra?</label
          >
          <input id="act" type="text" placeholder="Plugga JavaScript" />
          <button>Lägg till</button>
        </form>
      </div>
      <div
        style="background-color: rgba(0, 0, 0, 0.5); border: 2px solid black"
        class="p-5"
      >
        <h2 class="mb-3 text-primary">Att göra</h2>
        <ul id="todo" class="mb-4"></ul>
        <h2 class="mb-3 text-danger">Klart</h2>
        <ul id="done" class="mb-4"></ul>
        <button id="resetBtn">Börja om</button>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
